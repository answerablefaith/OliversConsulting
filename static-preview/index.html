<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Homepage Parity Preview - Olivers Consulting</title>
  <style>html,body{margin:0;min-height:100%;background:#efe8dc}</style>
</head>
<body>
  <script>
    (async function(){
      try {
        var response = await fetch('/?oc-parity-source=1', { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load the live homepage document');
        var html = await response.text();
        html = html.replace(/<head([^>]*)>/i, '<head$1>\n<meta name="robots" content="noindex,nofollow">\n<base href="/">');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main style="max-width:560px;margin:80px auto;padding:32px;font-family:system-ui,sans-serif;color:#17130b"><strong>Preview could not load</strong><p>' + String(error && error.message ? error.message : error) + '</p></main>';
      }
    })();
  </script>
</body>
</html>
