<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Homepage Parity Preview - Olivers Consulting</title>
  <style>body{margin:0;background:#efe8dc;color:#17130b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:grid;place-items:center}.notice{max-width:560px;padding:32px;text-align:center}.notice strong{display:block;font-size:22px;margin-bottom:8px}.notice p{margin:0;color:#5b5444;line-height:1.5}</style>
</head>
<body>
  <main class="notice"><strong>Loading the 1:1 homepage preview…</strong><p>This separate route renders the same homepage document and transformation pipeline as the live site.</p></main>
  <script>
    (async function(){
      try {
        var response = await fetch('/?oc-parity-source=1', { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load the live homepage document');
        var html = await response.text();
        html = html.replace(/<head([^>]*)>/i, '<head$1>\n<meta name="robots" content="noindex,nofollow">\n<base href="/">');
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main class="notice"><strong>Preview could not load</strong><p>' + String(error && error.message ? error.message : error) + '</p></main>';
      }
    })();
  </script>
</body>
</html>
