<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading Olivers Consulting</title>
<style>body{margin:0;background:#efe8dc;color:#17130b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;min-height:100vh}.loading{max-width:520px;padding:32px;text-align:center}.loading strong{display:block;font-size:22px;margin-bottom:8px}.loading p{margin:0;color:#5b5444;line-height:1.5}</style>
</head>
<body>
<div class="loading"><strong>Loading Olivers Consulting…</strong><p>Automation for UK ecommerce and wholesale teams.</p></div>
<script>
(async function(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/answerablefaith/OliversConsulting/e873b7eaba64a3c26d83e5d6a05447bf1a31d01a/new-homepage/Olivers-Consulting-v3.dc.html',{cache:'no-store'});
    if(!res.ok)throw new Error('source unavailable');
    let html=await res.text();
    html=html.replace(/<link\b[^>]*(?:fonts\.googleapis\.com|fonts\.gstatic\.com)[^>]*>\s*/gi,'');
    html=html.replace(/<link\b[^>]*href=["']\/assets\/fonts\.css["'][^>]*>\s*/gi,'');
    html=html.replace('</head>','<script src="/assets/privacy-fonts.js"><\/script></head>');
    html=html.replaceAll('src="./support.js"','src="/new-homepage/support.js"');
    html=html.replace('Then I ran my own ecommerce and wholesale business - feeling every one of those manual hours myself.','I ran my own ecommerce and wholesale business - feeling every one of those manual hours myself.');
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML='<main class="loading"><strong>Homepage could not load.</strong><p>Please refresh and try again shortly.</p></main>';
  }
})();
</script>
</body>
</html>
