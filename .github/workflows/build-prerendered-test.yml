name: Promote no-loader homepage

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build-prerendered-test.mjs'
      - '.github/workflows/build-prerendered-test.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start current live homepage locally
        run: |
          python3 -m http.server 8000 >/tmp/oc-homepage-server.log 2>&1 &
          echo $! > /tmp/oc-homepage-server.pid
          sleep 2

      - name: Generate production no-loader homepage
        env:
          OC_PRODUCTION: '1'
        run: node scripts/build-prerendered-test.mjs

      - name: Verify production output
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          if (html.length < 100000) throw new Error('Generated homepage is unexpectedly small.');
          if (html.includes('Loading Olivers Consulting')) throw new Error('Loading screen remains.');
          if (/name=["']robots["'][^>]*noindex/i.test(html)) throw new Error('Production homepage is still noindex.');
          if (!html.includes('<header id="top"')) throw new Error('Homepage content is missing.');
          if (!html.includes('id="oc-runtime-handoff"')) throw new Error('Runtime handoff is missing.');
          NODE

      - name: Commit production homepage
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --cached --quiet; then
            echo 'Production homepage already up to date.'
          else
            git commit -m 'Replace homepage with no-loader crawler-ready build'
            git push
          fi
