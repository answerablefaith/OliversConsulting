        html = html.replaceAll('◀', '&lt;').replaceAll('▶', '&gt;').replace("playIcon: s.playing ? '❚❚' : '&gt;'", "playIcon: s.playing ? 'Ⅱ' : '▷'");
        html = html.replaceAll('href="#articles"', 'href="/articles/"').replaceAll('href="https://oliversconsulting.com', 'href="https://oliversconsulting.co.uk').replaceAll('oliversconsulting.com', 'oliversconsulting.co.uk');
        html = html.replace(/https:\/\/media\.licdn\.com\/[^"']+/g, '/new-homepage/image3.png').replaceAll('./Henry Oliver - Professional Photo.png', '/new-homepage/image3.png').replaceAll('./image3.png', '/new-homepage/image3.png');
        html = html.replace('</body>', mobileEnhancements + byHandColourRamp + chapterOneAnimation + '</body>');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
