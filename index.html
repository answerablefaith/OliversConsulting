<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olivers Consulting - Automation for UK Ecommerce & Wholesale</title>
  <meta name="description" content="Fixed-price automation for UK ecommerce and wholesale teams. Supplier files, listings, stock, reports and invoices, built by an operator who ran a 200,000 SKU business.">
  <meta name="author" content="Henry Oliver">
  <link rel="canonical" href="https://oliversconsulting.co.uk/">
  <meta property="og:title" content="Olivers Consulting - Automation for UK Ecommerce & Wholesale">
  <meta property="og:description" content="8 hours to 2 minutes. Fixed-price automation built by an ecommerce operator, not an agency.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://oliversconsulting.co.uk/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
  <style>
    body{margin:0;background:#efe8dc;color:#17130b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;min-height:100vh}.loading{max-width:520px;padding:32px;text-align:center}.loading strong{display:block;font-size:22px;margin-bottom:8px}.loading p{margin:0;color:#5b5444;line-height:1.5}
  </style>
</head>
<body>
  <div class="loading"><strong>Loading Olivers Consulting…</strong><p>Automation for UK ecommerce and wholesale teams</p></div>
  <script>
    (async function () {
      const stableIndexUrl = 'https://cdn.jsdelivr.net/gh/answerablefaith/OliversConsulting@31f57f7984c91e5aaa979e577146b27011217748/index.html';
      const homepageSourceUrl = 'https://cdn.jsdelivr.net/gh/answerablefaith/OliversConsulting@e873b7eaba64a3c26d83e5d6a05447bf1a31d01a/new-homepage/Olivers-Consulting-v3.dc.html';

      async function fetchText(url) {
        const controller = new AbortController();
        const timeout = setTimeout(function () { controller.abort(); }, 12000);
        try {
          const response = await fetch(url, { cache: 'no-store', signal: controller.signal });
          if (!response.ok) throw new Error('Request failed: ' + response.status);
          return await response.text();
        } finally {
          clearTimeout(timeout);
        }
      }

      try {
        const results = await Promise.all([
          fetchText(stableIndexUrl),
          fetchText(homepageSourceUrl)
        ]);
        const stableIndex = results[0];
        const homepageSource = results[1];
        const embeddedSource = JSON.stringify(homepageSource)
          .replace(/<\/script/gi, '<\\/script')
          .replace(/\u2028/g, '\\u2028')
          .replace(/\u2029/g, '\\u2029');
        const fetchBlock = /const response = await fetch\('https:\/\/raw\.githubusercontent\.com\/answerablefaith\/OliversConsulting\/e873b7eaba64a3c26d83e5d6a05447bf1a31d01a\/new-homepage\/Olivers-Consulting-v3\.dc\.html', \{ cache: 'no-store' \}\);\s*if \(!response\.ok\) throw new Error\('Homepage file not found'\);\s*let html = await response\.text\(\);/;
        const patchedIndex = stableIndex.replace(fetchBlock, 'let html = ' + embeddedSource + ';');
        if (patchedIndex === stableIndex) throw new Error('Stable homepage patch did not apply');

        document.open();
        document.write(patchedIndex);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main class="loading"><strong>Homepage could not load.</strong><p>Please refresh the page. If the problem continues, the homepage CDN is unavailable.</p></main>';
      }
    })();
  </script>
</body>
</html>
