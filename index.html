<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olivers Consulting — Automation for UK Ecommerce & Wholesale</title>
  <meta name="description" content="Fixed-price automation for UK ecommerce and wholesale teams. Supplier files, listings, stock, reports and invoices, built by an operator who ran a 200,000 SKU business.">
  <meta name="author" content="Henry Oliver">
  <link rel="canonical" href="https://oliversconsulting.co.uk/">
  <meta property="og:title" content="Olivers Consulting — Automation for UK Ecommerce & Wholesale">
  <meta property="og:description" content="8 hours to 2 minutes. Fixed-price automation built by an ecommerce operator, not an agency.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://oliversconsulting.co.uk/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/assets/mobile-fixes.css">
  <style>
    body{margin:0;background:#efe8dc;color:#17130b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;min-height:100vh}
    .loading{max-width:520px;padding:32px;text-align:center}
    .loading strong{display:block;font-size:22px;margin-bottom:8px}
    .loading p{margin:0;color:#5b5444;line-height:1.5}
  </style>
</head>
<body>
  <div class="loading">
    <strong>Loading Olivers Consulting…</strong>
    <p>Automation for UK ecommerce and wholesale teams.</p>
  </div>
  <script>
    (async function () {
      try {
        const response = await fetch('/new-homepage/Olivers-Consulting-v3.dc.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Homepage file not found');
        let html = await response.text();

        const isMobile = window.matchMedia('(max-width: 900px)').matches;
        const isPhone = window.matchMedia('(max-width: 520px)').matches;
        const desktopLogoWidth = 'clamp(107px,12.2vw,163px)';
        const mobileLogoWidth = isPhone ? 'min(178px,47vw)' : 'min(190px,48vw)';
        const navStyle = isMobile
          ? 'max-width:1180px;margin:0 auto;padding:18px 20px 14px;display:grid;grid-template-columns:auto 1fr;align-items:start;gap:12px 14px;border-bottom:2px solid #17130b;overflow:hidden'
          : 'max-width:1180px;margin:0 auto;padding:26px 40px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #17130b';
        const menuStyle = isMobile
          ? 'grid-column:1/-1;width:100%;display:none;grid-template-columns:1fr;gap:10px;align-items:stretch;margin:4px 0 0 0'
          : 'display:flex;align-items:center;gap:28px';
        const mobileLinkStyle = 'color:#3f3a2d;font-size:15px;font-weight:500;border:1.5px solid #d6cdba;border-radius:8px;background:#f5efe4;padding:10px 12px;text-align:center;line-height:1.15;white-space:normal';
        const mobileCtaStyle = 'background:#1e3b2f;color:#efe8dc;padding:13px 16px;font-family:\'Saira Condensed\',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 16px -8px rgba(30,59,47,.7);text-align:center;line-height:1.15;white-space:normal';
        const mobileMenuButton = '<button id="oc-menu-toggle" class="oc-menu-toggle" type="button" aria-controls="oc-mobile-menu" aria-expanded="false" style="justify-self:end;align-self:start;margin-top:7px;border:2px solid #17130b;background:transparent;color:#17130b;border-radius:9px;padding:9px 15px;font-family:\'Saira Condensed\',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:15px;line-height:1;cursor:pointer">Menu</button>';
        const mobileMenuScript = '<script id="oc-mobile-menu-script">(function(){function setup(){var button=document.getElementById("oc-menu-toggle");var menu=document.getElementById("oc-mobile-menu");if(!button||!menu||button.dataset.ready==="true")return;button.dataset.ready="true";button.addEventListener("click",function(event){event.preventDefault();var open=menu.getAttribute("data-open")==="true";menu.setAttribute("data-open",String(!open));menu.style.display=open?"none":"grid";button.setAttribute("aria-expanded",String(!open));button.textContent=open?"Menu":"Close";});menu.querySelectorAll("a").forEach(function(link){link.addEventListener("click",function(){menu.setAttribute("data-open","false");menu.style.display="none";button.setAttribute("aria-expanded","false");button.textContent="Menu";});});}setup();document.addEventListener("DOMContentLoaded",setup);setTimeout(setup,50);setTimeout(setup,300);})();<\/script>';

        const liveHead = '<head>\n<meta charset="utf-8">\n<meta name="viewport" content="width=device-width, initial-scale=1">\n<title>Olivers Consulting — Automation for UK Ecommerce & Wholesale</title>\n<meta name="description" content="Fixed-price automation for UK ecommerce and wholesale teams. Supplier files, listings, stock, reports and invoices, built by an operator who ran a 200,000 SKU business.">\n<meta name="author" content="Henry Oliver">\n<link rel="canonical" href="https://oliversconsulting.co.uk/">\n<meta property="og:title" content="Olivers Consulting — Automation for UK Ecommerce & Wholesale">\n<meta property="og:description" content="8 hours to 2 minutes. Fixed-price automation built by an ecommerce operator, not an agency.">\n<meta property="og:type" content="website">\n<meta property="og:url" content="https://oliversconsulting.co.uk/">\n<meta name="twitter:card" content="summary_large_image">\n<link rel="icon" href="/favicon.svg" type="image/svg+xml">\n<link rel="alternate icon" href="/favicon.ico" type="image/x-icon">\n<link rel="stylesheet" href="/assets/mobile-fixes.css">' + (isMobile ? '\n<style id="oc-mobile-header-pattern">#oc-home-nav{display:grid!important;grid-template-columns:auto 1fr!important;align-items:start!important;justify-items:stretch!important;padding:18px 20px 14px!important;gap:12px 14px!important}#oc-home-nav .oc-home-logo{grid-column:1!important;grid-row:1!important;justify-self:start!important;width:auto!important}#oc-home-nav .oc-menu-toggle{grid-column:2!important;grid-row:1!important;justify-self:end!important;align-self:start!important;margin-top:7px!important;width:auto!important}#oc-mobile-menu{grid-column:1/-1!important;grid-row:2!important}#oc-mobile-menu a{width:100%!important}</style>' : '');
        html = html.replace('<head>', liveHead);
        html = html.replaceAll('src="./support.js"', 'src="/new-homepage/support.js"');
        html = html.replace('<nav style="max-width:1180px;margin:0 auto;padding:26px 40px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #17130b">', `<nav id="oc-home-nav" style="${navStyle}">`);
        html = html.replace('<a href="#top" style="display:flex;align-items:center;gap:16px">\n      <span style="display:flex;align-items:center">\n        <span style="display:inline-block;width:22px;height:22px;border-top:5px solid #c07c1f;border-right:5px solid #c07c1f;transform:rotate(45deg)"></span>\n        <span style="display:inline-block;width:22px;height:22px;border-top:5px solid #17130b;border-right:5px solid #17130b;transform:rotate(45deg);margin-left:-10px"></span>\n      </span>\n      <span style="line-height:.82">\n        <span style="display:block;font-family:\'Saira Condensed\',sans-serif;font-weight:800;font-size:34px;letter-spacing:.02em;text-transform:uppercase">Olivers</span>\n        <span style="display:block;font-family:\'Hanken Grotesk\',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.34em;color:#5b5444;margin-top:4px">CONSULTING</span>\n      </span>\n    </a>', `<a class="oc-home-logo" href="/" style="display:flex;align-items:center;flex:0 0 auto;width:auto;max-width:100%;padding:0;background:transparent;border:0" aria-label="Olivers Consulting home"><img class="oc-home-logo-img" src="/assets/oc-logo.png" alt="Olivers Consulting" style="display:block;width:${isMobile ? mobileLogoWidth : desktopLogoWidth};height:auto;max-width:100%"></a>` + (isMobile ? mobileMenuButton : ''));
        html = html.replace('<div style="display:flex;align-items:center;gap:28px">', `<div id="oc-mobile-menu" data-open="false" style="${menuStyle}">`);
        if (isMobile) {
          html = html.replaceAll('style="color:#3f3a2d;font-size:15px;font-weight:500"', `style="${mobileLinkStyle}"`);
          html = html.replace('style="background:#1e3b2f;color:#efe8dc;padding:10px 18px;font-family:\'Saira Condensed\',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:15px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;box-shadow:0 6px 16px -8px rgba(30,59,47,.7);transition:transform .18s,background .18s"', `style="${mobileCtaStyle}"`);
        }
        html = html.replace('<a href="#services" style="color:#3f3a2d;font-size:15px;font-weight:500">What I automate</a>', '<a href="/" style="color:#3f3a2d;font-size:15px;font-weight:500">Home</a><a href="#services" style="color:#3f3a2d;font-size:15px;font-weight:500">What I automate</a>');
        if (isMobile) {
          html = html.replace('<a href="/" style="color:#3f3a2d;font-size:15px;font-weight:500">Home</a><a href="#services" style="color:#3f3a2d;font-size:15px;font-weight:500">What I automate</a>', `<a href="/" style="${mobileLinkStyle}">Home</a><a href="#services" style="${mobileLinkStyle}">What I automate</a>`);
          html = html.replace('</body>', mobileMenuScript + '</body>');
        }
        html = html.replaceAll('/assets/oc-full-logo.svg', '/assets/oc-logo.png');
        html = html.replaceAll('href="#articles"', 'href="/articles/"');
        html = html.replaceAll('href="https://oliversconsulting.com', 'href="https://oliversconsulting.co.uk');
        html = html.replaceAll('oliversconsulting.com', 'oliversconsulting.co.uk');
        html = html.replace(/https:\/\/media\.licdn\.com\/[^"']+/g, '/new-homepage/image3.png');
        html = html.replaceAll('./Henry Oliver - Professional Photo.png', '/new-homepage/image3.png');
        html = html.replaceAll('./image3.png', '/new-homepage/image3.png');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main class="loading"><strong>Homepage could not load.</strong><p>Please try again shortly.</p></main>';
      }
    })();
  </script>
</body>
</html>
