<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olivers Consulting — Automation for UK Ecommerce & Wholesale</title>
  <meta name="description" content="Fixed-price automation for UK ecommerce and wholesale teams. Supplier files, listings, stock, reports and invoices, built by an operator who ran a 200,000 SKU business.">
  <meta name="author" content="Henry Oliver">
  <link rel="canonical" href="https://oliversconsulting.co.uk/">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
  <style>
    body{margin:0;background:#efe8dc;color:#17130b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;padding:28px;text-align:center;box-sizing:border-box}
    .loading strong{display:block;font-size:22px;margin-bottom:8px}
    .loading p{margin:0;color:#5b5444;line-height:1.5}
    .loading a{color:#1e3b2f;font-weight:700}
  </style>
</head>
<body>
  <main class="loading" id="homepage-status">
    <div>
      <strong>Loading Olivers Consulting…</strong>
      <p>Automation for UK ecommerce and wholesale teams.</p>
    </div>
  </main>
  <script>
    (async function () {
      const status = document.getElementById('homepage-status');
      try {
        const response = await fetch('/new-homepage/Olivers-Consulting-v3.dc.html?v=20260710-1', { cache: 'no-store' });
        if (!response.ok) throw new Error('Homepage source returned ' + response.status);

        let html = await response.text();
        if (!html || !/<body[\s>]/i.test(html)) throw new Error('Homepage source was empty or invalid');

        html = html.replaceAll('src="./support.js"', 'src="/new-homepage/support.js?v=20260710-5"');
        html = html.replaceAll("src='./support.js'", "src='/new-homepage/support.js?v=20260710-5'");
        html = html.replaceAll('./image3.png', '/new-homepage/image3.png');
        html = html.replaceAll('./Henry Oliver - Professional Photo.png', '/new-homepage/image3.png');
        html = html.replaceAll('oliversconsulting.com', 'oliversconsulting.co.uk');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error('Homepage load failed:', error);
        status.innerHTML = '<div><strong>Homepage could not load.</strong><p>Please refresh once. If the problem continues, <a href="/articles/">the articles page is still available</a>.</p></div>';
      }
    })();
  </script>
</body>
</html>
